name: Build hev-socks5-tproxy for OpenWrt 22.03 mipsel-musl

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install minimal build tools
        run: |
          sudo apt update -qq
          sudo apt install -y -qq gcc g++ git bzip2 xz-utils make

      - name: Cache cross compiler
        uses: actions/cache@v3
        with:
          path: /opt/cross
          key: musl-cross-make-mipsel-softfloat-v1

      - name: Build musl-cross-make
        run: |
          set -e
          if [ ! -d "/opt/cross/bin" ]; then
            git clone --depth=1 https://github.com/richfelker/musl-cross-make.git
            cd musl-cross-make
            echo "TARGET=mipsel-linux-musl" > config.mak
            echo "OUTPUT=/opt/cross" >> config.mak
            echo "GCC_CONFIG += --with-float=soft" >> config.mak
            make -j2
            sudo make install
          fi
          echo "/opt/cross/bin" >> $GITHUB_PATH

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Compile static binary
        run: |
          export CROSS_COMPILE=mipsel-linux-musl-
          make CFLAGS="-static -Os -ffunction-sections -fdata-sections" LDFLAGS="-static -Wl,--gc-sections"
          mipsel-linux-musl-strip hev-socks5-tproxy
          mv hev-socks5-tproxy hev-socks5-tproxy-mipsel-musl-openwrt2203

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hev-socks5-tproxy-mipsel-musl-openwrt2203
          path: hev-socks5-tproxy-mipsel-musl-openwrt2203

