name: Build hev-socks5-tproxy for OpenWrt 22.03 mipsel-musl

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install build tools
        run: |
          sudo apt update -qq
          sudo apt install -y -qq git make sed

      - name: Cache cross compiler
        uses: actions/cache@v3
        with:
          path: /opt/cross
          key: musl-cross-make-mipsel-softfloat-v2

      - name: Build musl-cross-make (EU mirror)
        run: |
          set -e
          if [ ! -d "/opt/cross/bin" ]; then
            git clone --depth=1 https://github.com/richfelker/musl-cross-make.git
            cd musl-cross-make
            # 替换为德国欧洲GNU镜像
            sed -i 's|https://ftp.gnu.org/gnu|https://ftp.de.debian.org/gnu|g' Makefile
            echo "TARGET=mipsel-linux-musl" > config.mak
            echo "OUTPUT=/opt/cross" >> config.mak
            echo "GCC_CONFIG += --with-float=soft" >> config.mak
            make -j2
            sudo make install
          fi
          echo "/opt/cross/bin" >> $GITHUB_PATH

      - name: Checkout source with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Compile (pure make, no extra compile flags)
        run: |
          export CROSS_COMPILE=mipsel-linux-musl-
          make
          mipsel-linux-musl-strip bin/hev-socks5-tproxy
          cp bin/hev-socks5-tproxy ./hev-socks5-tproxy-mipsel-musl-openwrt2203

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hev-socks5-tproxy-mipsel-musl-openwrt2203
          path: hev-socks5-tproxy-mipsel-musl-openwrt2203

