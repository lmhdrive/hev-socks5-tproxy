name: Build hev-socks5-tproxy (mipsel-musl prebuilt toolchain)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install host dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y -qq make wget tar xz-utils file

      - name: Cache prebuilt cross toolchain
        uses: actions/cache@v3
        with:
          path: /opt/cross
          key: mipsel-linux-musl-prebuilt-v1

      - name: Fetch prebuilt mipsel-linux-musl toolchain
        run: |
          set -e
          if [ ! -d "/opt/cross/bin" ]; then
            wget -q https://github.com/osdev0/musl-cross/releases/download/mipsel-linux-musl/mipsel-linux-musl-cross.tar.xz
            tar -xf mipsel-linux-musl-cross.tar.xz
            sudo rm -rf /opt/cross
            sudo mv mipsel-linux-musl-cross /opt/cross
          fi
          echo "/opt/cross/bin" >> $GITHUB_PATH
          # 校验工具链
          mipsel-linux-musl-gcc --version
          mipsel-linux-musl-strip --version

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Compile static non-PIE
        env:
          CROSS_COMPILE: mipsel-linux-musl-
          CFLAGS: -static -no-pie -O2
          LDFLAGS: -static -no-pie
        run: |
          make clean
          make pure
          file bin/hev-socks5-tproxy
          # strip容错，失败不阻断流程
          if mipsel-linux-musl-strip --strip-unneeded bin/hev-socks5-tproxy; then
            echo "Strip success"
          else
            echo "Strip skipped, keep full binary"
          fi
          cp bin/hev-socks5-tproxy ./hev-socks5-tproxy-mipsel-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hev-socks5-tproxy-mipsel-musl
          path: hev-socks5-tproxy-mipsel-musl

