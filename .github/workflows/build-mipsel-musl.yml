name: Build hev-socks5-tproxy for OpenWrt 22.03 mipsel-musl

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up job
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install build tools
        run: |
          sudo apt update -qq
          sudo apt install -y make git sed wget

      - name: Cache cross compiler
        uses: actions/cache@v3
        with:
          path: /opt/cross
          key: musl-cross-make-mipsel

      - name: Build musl-cross-make
        run: |
          set -e
          if [ ! -d "/opt/cross/bin" ]; then
            git clone --depth=1 https://github.com/richfelker/musl-cross-make.git
            cd musl-cross-make
            sed -i 's|https://ftp.gnu.org/gnu|https://mirrors.illinois.edu/gnu|g' Makefile
            sed -i '/mirror.latigo.net/d' Makefile
            sed -i 's/wget /wget --timeout=30 --tries=2 /g' Makefile
            echo "TARGET=mipsel-linux-musl" > config.mak
            echo "OUTPUT=/opt/cross" >> config.mak
            make -j2
            sudo make install
          fi
          echo "/opt/cross/bin" >> $GITHUB_PATH

      - name: Compile hev-socks5-tproxy
        env:
          CROSS_COMPILE: mipsel-linux-musl-
          CFLAGS: -static -no-pie
        run: |
          set -e
          make clean
          make
          file bin/hev-socks5-tproxy
          mipsel-linux-musl-strip bin/hev-socks5-tproxy || true
          cp bin/hev-socks5-tproxy ./hev-socks5-tproxy-mipsel-musl-openwrt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hev-socks5-tproxy-mipsel
          path: hev-socks5-tproxy-mipsel-musl-openwrt
