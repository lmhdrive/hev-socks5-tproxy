name: Build hev-socks5-tproxy for OpenWrt 22.03 mipsel-musl

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install build tools
        run: |
          sudo apt update -qq
          sudo apt install -y -qq git make sed wget xz-utils file

      - name: Cache cross compiler
        uses: actions/cache@v3
        with:
          path: /opt/cross
          key: musl-cross-make-mipsel-illinois-v3

      - name: Build musl-cross-make (US university mirror, softfloat)
        run: |
          set -e
          if [ ! -d "/opt/cross/bin" ]; then
            git clone --depth=1 https://github.com/richfelker/musl-cross-make.git
            cd musl-cross-make
            # 替换GNU镜像为伊利诺伊镜像，提升国外下载稳定性
            sed -i 's|https://ftp.gnu.org/gnu|https://mirrors.illinois.edu/gnu|g' Makefile
            # 写入配置：mipsel-linux-musl + 软浮点 + 输出目录
            echo "TARGET=mipsel-linux-musl" > config.mak
            echo "OUTPUT=/opt/cross" >> config.mak
            echo "GCC_CONFIG += --with-float=soft" >> config.mak
            # 关闭PIE，从工具链层面避免PIE ELF导致strip不认
            echo "CFLAGS += -no-pie" >> config.mak
            echo "LDFLAGS += -no-pie" >> config.mak
            make -j$(nproc)
            sudo make install
          fi
          echo "/opt/cross/bin" >> $GITHUB_PATH
          # 验证工具链
          mipsel-linux-musl-gcc --version
          mipsel-linux-musl-strip --version

      - name: Checkout source with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Compile static non-PIE (fix strip recognize error)
        env:
          CROSS_COMPILE: mipsel-linux-musl-
          # 强制静态链接 + 关闭PIE，生成传统ELF
          CFLAGS: -static -no-pie -O2
          LDFLAGS: -static -no-pie
        run: |
          set -e
          make clean
          make pure
          # 先看一下ELF格式，排错用
          file bin/hev-socks5-tproxy
          # strip加容错：如果识别失败就跳过strip，不阻断CI
          if mipsel-linux-musl-strip --strip-unneeded bin/hev-socks5-tproxy; then
            echo "strip success"
          else
            echo "strip failed, keep original binary"
          fi
          cp bin/hev-socks5-tproxy ./hev-socks5-tproxy-mipsel-musl-openwrt2203

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hev-socks5-tproxy-mipsel-musl-openwrt2203
          path: hev-socks5-tproxy-mipsel-musl-openwrt2203
