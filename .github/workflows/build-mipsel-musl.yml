name: Build hev-socks5-tproxy mipsel-musl (final stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install host basic tools
        run: |
          sudo apt update -qq
          sudo apt install -y -qq make wget tar xz-utils file

      - name: Cache cross toolchain
        uses: actions/cache@v3
        with:
          path: /opt/cross
          key: mipsel-musl-prebuilt-v2

      - name: Fetch prebuilt toolchain (with retry)
        run: |
          if [ ! -d "/opt/cross/bin" ]; then
            echo "Downloading cross toolchain..."
            for attempt in 1 2; do
              wget --timeout=30 --tries=2 -q https://github.com/osdev0/musl-cross/releases/download/mipsel-linux-musl/mipsel-linux-musl-cross.tar.xz
              if [ $? -eq 0 ]; then
                break
              fi
              echo "Retry download..."
              sleep 6
            done

            if [ -f "mipsel-linux-musl-cross.tar.xz" ]; then
              tar -xf mipsel-linux-musl-cross.tar.xz
              sudo rm -rf /opt/cross
              sudo mv mipsel-linux-musl-cross /opt/cross
            else
              echo "Toolchain download failed, exit."
              exit 1
            fi
          fi

          echo "/opt/cross/bin" >> $GITHUB_PATH

          # 轻量强校验：必须找到交叉编译器
          if ! command -v mipsel-linux-musl-gcc >/dev/null; then
            echo "ERROR: cross compiler not found!"
            exit 1
          fi

          mipsel-linux-musl-gcc --version
          mipsel-linux-musl-strip --version

      - name: Checkout source & submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Compile static non-PIE
        env:
          CROSS_COMPILE: mipsel-linux-musl-
          CFLAGS: -static -no-pie -O2
          LDFLAGS: -static -no-pie
        run: |
          set -e
          make clean
          make pure

          # 打印ELF信息，方便事后核对架构
          file bin/hev-socks5-tproxy

          # strip容错，识别不了就跳过
          if mipsel-linux-musl-strip --strip-unneeded bin/hev-socks5-tproxy; then
            echo "Strip OK"
          else
            echo "Strip skipped"
          fi

          cp bin/hev-socks5-tproxy ./hev-socks5-tproxy-mipsel-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hev-socks5-tproxy-mipsel-musl
          path: hev-socks5-tproxy-mipsel-musl
